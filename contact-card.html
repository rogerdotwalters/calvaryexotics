<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calvary Exotics — Contact Card</title>
  <meta name="description" content="Get in touch with Calvary Exotics. Find us on Instagram, Facebook, or pay via CashApp and Venmo." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-deep:   #0d1a0f;
      --green-mid:    #1a3320;
      --green-accent: #2e5e35;
      --gold:         #c9a84c;
      --gold-dim:     #a07c2e;
      --cream:        #f5f0e8;
      --text-light:   #d4cfc6;
      --text-muted:   #8a9e8d;
      --radius:       14px;
      --shadow:       0 8px 32px rgba(0,0,0,0.45);
    }

    html, body {
      min-height: 100%;
      background: var(--green-deep);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 16px;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(46,94,53,0.35) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(201,168,76,0.08) 0%, transparent 55%),
        var(--green-deep);
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(160deg, rgba(26,51,32,0.95) 0%, rgba(13,26,15,0.98) 100%);
      border: 1px solid rgba(201,168,76,0.18);
      border-radius: 24px;
      padding: 44px 36px 36px;
      box-shadow: var(--shadow), inset 0 1px 0 rgba(201,168,76,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Logo ── */
    .card-logo {
      width: 320px;
      height: auto;
      margin-bottom: 20px;
    }

    /* Fallback wordmark if SVG not found */
    .card-wordmark {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--gold);
      text-align: center;
      margin-bottom: 6px;
    }

    .card-tagline {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
      margin-bottom: 32px;
    }

    /* ── Links list ── */
    .card-links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      list-style: none;
    }

    .card-links a {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
      color: var(--cream);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.18s, border-color 0.18s, transform 0.14s;
    }

    .card-links a:hover,
    .card-links a:focus-visible {
      background: rgba(201,168,76,0.08);
      border-color: rgba(201,168,76,0.35);
      transform: translateY(-1px);
      outline: none;
    }

    .card-links a:active {
      transform: translateY(0);
    }

    .link-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg { width: 20px; height: 20px; }
    .link-icon--cashapp svg { width: 28px; height: 28px; }

    .link-icon--phone    { background: rgba(46,94,53,0.55);  color: #6ecf77; }
    .link-icon--email    { background: rgba(201,168,76,0.18); color: var(--gold); }
    .link-icon--web      { background: rgba(255,255,255,0.08); color: #a8c5ff; }
    .link-icon--ig       { background: rgba(193,53,132,0.2);  color: #e1699a; }
    .link-icon--fb       { background: rgba(24,119,242,0.2);  color: #6fa8e8; }
    .link-icon--cashapp  { background: rgba(0,212,109,0.15);  color: #00d46d; }
    .link-icon--venmo    { background: rgba(0,136,204,0.18);  color: #52b8e8; }

    .link-body {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .link-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .link-value {
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--cream);
    }

    /* ── Footer ── */
    .card-footer {
      margin-top: 28px;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: rgba(138,158,141,0.6);
      text-align: center;
    }

    @media (max-width: 440px) {
      .card { padding: 36px 24px 28px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .card-links a { transition: none; }
    }
  </style>
</head>
<body>

  <div class="card" role="main">

    <!-- Logo — swap src if your file is named differently -->
    <img class="card-logo" src="logo_gold.svg" alt="Calvary Exotics"
         onerror="this.style.display='none'; document.querySelector('.card-wordmark').style.display='block';" />

    <p class="card-wordmark" style="display:none;">Calvary Exotics</p>
    <p class="card-tagline">Passion. Care. Commitment.</p>

    <div class="divider"></div>

    <ul class="card-links">

      <!-- Phone -->
      <li>
        <a href="tel:+15550000000">
          <span class="link-icon link-icon--phone">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.13 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.04 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </span>
          <span class="link-body">
            <span class="link-label">Phone / Text</span>
            <!-- Replace with your number -->
            <span class="link-value">(903) 360-1494</span>
          </span>
        </a>
      </li>

      <!-- Email -->
      <li>
        <a href="mailto:hello@calvaryexotics.com?subject=Inquiry%20from%20Calvary%20Exotics%20Website">
          <span class="link-icon link-icon--email">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </span>
          <span class="link-body">
            <span class="link-label">Email</span>
            <!-- Replace with your email -->
            <span class="link-value">calvaryexotics@gmail.com</span>
          </span>
        </a>
      </li>

      <!-- Website -->
      <li>
        <a href="index.html">
          <span class="link-icon link-icon--web">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="12" r="10"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
          </span>
          <span class="link-body">
            <span class="link-label">Website</span>
            <span class="link-value">calvaryexotics.com</span>
          </span>
        </a>
      </li>

      <!-- Instagram -->
      <li>
        <a href="https://instagram.com/calvary_exotics" target="_blank" rel="noopener noreferrer">
          <span class="link-icon link-icon--ig">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
            </svg>
          </span>
          <span class="link-body">
            <span class="link-label">Instagram</span>
            <!-- Replace with your handle -->
            <span class="link-value">@calvary_exotics</span>
          </span>
        </a>
      </li>

      <!-- Facebook -->
      <li>
        <a href="https://www.facebook.com/p/Calvary-Exotics-100090141893803/" target="_blank" rel="noopener noreferrer">
          <span class="link-icon link-icon--fb">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
            </svg>
          </span>
          <span class="link-body">
            <span class="link-label">Facebook</span>
            <!-- Replace with your page name -->
            <span class="link-value">Calvary Exotics</span>
          </span>
        </a>
      </li>

      <!-- CashApp -->
      <li>
        <a href="https://cash.app/$calvaryexotics" target="_blank" rel="noopener noreferrer">
          <span class="link-icon link-icon--cashapp">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.15 14.46c-.19 1.7-1.64 2.74-3.65 2.74h-.2v1.32a.38.38 0 0 1-.38.38h-1.28a.38.38 0 0 1-.38-.38V17.2a7.18 7.18 0 0 1-3.08-.88.37.37 0 0 1-.11-.52l.72-1.13a.38.38 0 0 1 .52-.11 5.3 5.3 0 0 0 2.68.78h.2c.95 0 1.56-.4 1.63-1.02.16-1.46-4.96-1.07-4.59-4.6.18-1.66 1.57-2.69 3.53-2.74V5.48a.38.38 0 0 1 .38-.38h1.28a.38.38 0 0 1 .38.38v1.54a6.34 6.34 0 0 1 2.49.72.38.38 0 0 1 .13.53l-.69 1.1a.38.38 0 0 1-.52.12 4.74 4.74 0 0 0-2.34-.64h-.2c-1.02 0-1.52.46-1.57.97-.14 1.44 4.94 1.01 4.55 4.62z"/>
            </svg>
          </span>
          <span class="link-body">
            <span class="link-label">CashApp</span>
            <!-- Replace with your $cashtag -->
            <span class="link-value">$calvaryexotics</span>
          </span>
        </a>
      </li>

      <!-- Venmo -->
      <li>
        <a href="https://venmo.com/calvaryexotics" target="_blank" rel="noopener noreferrer">
          <span class="link-icon link-icon--venmo">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M19.5 2c.6 1.1.87 2.18.87 3.57 0 4.44-3.79 10.2-6.87 14.43H6.94L4 2.98l5.65-.54 1.56 12.56C12.8 12.4 15.1 7.8 15.1 5c0-1.14-.2-2.1-.52-2.87L19.5 2z"/>
            </svg>
          </span>
          <span class="link-body">
            <span class="link-label">Venmo</span>
            <!-- Replace with your @venmo handle -->
            <span class="link-value">@calvaryexotics</span>
          </span>
        </a>
      </li>

    </ul>

    <p class="card-footer">&copy; <span id="yr"></span> Calvary Exotics</p>
  </div>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();
  </script>

</body>
</html>
